<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#181818;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:#2b2b2b;
    border-radius:25px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    text-align:center;
}

h1{
    color:white;
    margin-bottom:30px;
    letter-spacing:2px;
    font-size:2rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:25px;
}

.sound-btn{
    aspect-ratio:1/1;
    width:100%;
    border-radius:50%;
    border:none;
    cursor:pointer;

    color:white;
    font-size:20px;
    font-weight:bold;

    background:linear-gradient(180deg,#9f67ff,#6d28d9);

    box-shadow:
        inset 0 8px 12px rgba(255,255,255,.25),
        inset 0 -8px 12px rgba(0,0,0,.35),
        0 0 15px rgba(157,78,221,.45),
        0 0 35px rgba(157,78,221,.35),
        0 12px 0 #4c1d95,
        0 18px 30px rgba(0,0,0,.5);

    transition:.15s;
    animation:glow 2s ease-in-out infinite;
}

.sound-btn:hover{
    transform:translateY(-3px);
    box-shadow:
        inset 0 8px 12px rgba(255,255,255,.35),
        inset 0 -8px 12px rgba(0,0,0,.35),
        0 0 25px #b66dff,
        0 0 50px #9d4edd,
        0 0 80px rgba(157,78,221,.6),
        0 15px 0 #4c1d95,
        0 22px 40px rgba(0,0,0,.55);
}

.sound-btn:active{
    transform:translateY(8px);

    box-shadow:
        inset 0 8px 12px rgba(255,255,255,.2),
        inset 0 -8px 12px rgba(0,0,0,.4),
        0 0 12px #9d4edd,
        0 3px 0 #4c1d95,
        0 8px 15px rgba(0,0,0,.45);
}

@keyframes glow{
    0%,100%{
        box-shadow:
            inset 0 8px 12px rgba(255,255,255,.25),
            inset 0 -8px 12px rgba(0,0,0,.35),
            0 0 15px rgba(157,78,221,.45),
            0 0 35px rgba(157,78,221,.35),
            0 12px 0 #4c1d95,
            0 18px 30px rgba(0,0,0,.5);
    }

    50%{
        box-shadow:
            inset 0 8px 12px rgba(255,255,255,.35),
            inset 0 -8px 12px rgba(0,0,0,.35),
            0 0 30px #c77dff,
            0 0 60px #9d4edd,
            0 0 90px rgba(157,78,221,.6),
            0 12px 0 #4c1d95,
            0 18px 30px rgba(0,0,0,.5);
    }
}

/* Mobile */
@media (max-width:600px){

    .container{
        padding:20px;
    }

    h1{
        font-size:1.6rem;
        margin-bottom:25px;
    }

    .grid{
        grid-template-columns:repeat(2,1fr);
        gap:20px;
    }

    .sound-btn{
        font-size:18px;
    }
}
</style>
